name: Build Admin APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Manual EAS CLI Install (Backup)
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild
        run: npx expo prebuild --platform android --no-install --non-interactive

      - name: Verify Android Folder
        run: |
          if [ ! -d "android" ]; then
            echo "Error: android directory not found after prebuild!"
            exit 1
          fi

      - name: Build APK (Pure Gradle)
        run: |
          export NODE_BINARY=$(which node)
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: admin-apk
          path: android/app/build/outputs/apk/release/*.apk
